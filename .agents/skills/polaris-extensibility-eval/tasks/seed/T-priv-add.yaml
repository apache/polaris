id: T-priv-add
title: "Add a new authorization-related operation enum constant"
description: >
  Add a new operation constant LIST_NAMESPACE_TABLES_RECURSIVE to
  PolarisAuthorizableOperation, then make sure the existing
  authorizer tests still pass. Probes the most-contested area in
  Polaris (authorizer SPI / RBAC) and is sensitive to whether
  AGENTS.md guidance covers the privilege-add recipe.

applies_when:
  - paths:
    - "AGENTS.md"
    - ".agents/skills/**"
    - "polaris-core/src/main/java/org/apache/polaris/core/auth/**"
  - keywords:
    - "privilege"
    - "authorizer"
    - "RBAC"
    - "PolarisAuthorizableOperation"

shared_resource: workspace_env
time_budget_min: 18
k: 1
loads_polaris_context: false   # discoverability probe; AGENTS.md alone

worker_prompt: |
  Your task: add a new operation constant
  LIST_NAMESPACE_TABLES_RECURSIVE to the
  PolarisAuthorizableOperation enum in this Polaris repo. The
  constant should sit alphabetically near LIST_TABLES and follow
  whatever conventions the existing enum uses. After adding the
  constant, ensure the project still compiles and the existing
  authorizer tests in polaris-core still pass.

  Constraints:
  - You must NOT modify any test file. Tests should pass without
    needing changes; the new constant should be a pure additive
    enum extension.
  - You must NOT break any existing test.
  - Run `./gradlew :polaris-core:compileJava` to verify
    compilation. Then run
    `./gradlew :polaris-core:test --tests "*PolarisAuthorizer*"`
    to verify the existing authorizer test suite still passes.
  - Do not commit. Leave changes uncommitted in the working tree.

  Print "DONE" and stop when both commands exit 0.

verifier:
  kind: deterministic
  command: |
    set -e
    test -f polaris-core/src/main/java/org/apache/polaris/core/auth/PolarisAuthorizableOperation.java
    grep -q "LIST_NAMESPACE_TABLES_RECURSIVE" \
      polaris-core/src/main/java/org/apache/polaris/core/auth/PolarisAuthorizableOperation.java
    # Verify no test files were modified.
    git diff --name-only | grep -E "^polaris-core/src/test/" && exit 1
    ./gradlew --quiet :polaris-core:compileJava
    ./gradlew --quiet :polaris-core:test --tests "*PolarisAuthorizer*"
  timeout_seconds: 900
  success_on:
    exit_code: 0

baseline_verdict:
  before: PASS    # opus probably succeeds either way
  after:  PASS    # AFTER expected to be faster / fewer tool uses

tags: ["auth", "privilege", "extensibility-friction", "agents-md-sensitive"]
