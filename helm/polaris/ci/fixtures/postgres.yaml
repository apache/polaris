apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17.2
          ports:
            - containerPort: 5432
          resources:
            limits:
              memory: "128Mi"
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "POLARIS"
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding UTF8 --data-checksums"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 15
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
      app: postgres
  ports:
      - protocol: TCP
        port: 5432
        targetPort: 5432
