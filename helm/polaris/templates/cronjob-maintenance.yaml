{{- range $jobName, $jobSpec := .Values.maintenance.jobs }}
{{- if $jobSpec.enabled }}
{{- $cronName := printf "%s-maint-%s" (include "polaris.fullname" $) $jobName }}
{{- if gt (len $cronName) 52 }}
  {{- fail (printf "Maintenance CronJob name %q is %d chars; must be <= 52 (K8s appends a timestamp+random suffix to generated Pod names, which are capped at 63). Shorten release name, nameOverride/fullnameOverride, or the job key %q." $cronName (len $cronName) $jobName) }}
{{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $cronName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "polaris.labels" $ | nindent 4 }}
  {{- with $.Values.maintenance.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ $jobSpec.schedule | quote }}
  concurrencyPolicy: {{ default "Forbid" $jobSpec.concurrencyPolicy }}
  {{- if hasKey $jobSpec "successfulJobsHistoryLimit" }}
  successfulJobsHistoryLimit: {{ $jobSpec.successfulJobsHistoryLimit }}
  {{- end }}
  {{- if hasKey $jobSpec "failedJobsHistoryLimit" }}
  failedJobsHistoryLimit: {{ $jobSpec.failedJobsHistoryLimit }}
  {{- end }}
  jobTemplate:
    spec:
      {{- if hasKey $jobSpec "backoffLimit" }}
      backoffLimit: {{ $jobSpec.backoffLimit }}
      {{- end }}
      {{- with $jobSpec.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      template:
        metadata:
          labels:
            helm.sh/chart: {{ include "polaris.chart" $ }}
            app.kubernetes.io/name: {{ include "polaris.name" $ }}-maintenance
            app.kubernetes.io/instance: {{ $.Release.Name }}
            app.kubernetes.io/component: maintenance
            app.kubernetes.io/managed-by: {{ $.Release.Service }}
            {{- if $.Chart.AppVersion }}
            app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
            {{- end }}
          {{- with $jobSpec.podAnnotations }}
          annotations:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
        spec:
          {{- if $.Values.imagePullSecrets }}
          imagePullSecrets:
          {{- range $.Values.imagePullSecrets }}
            - name: {{ . | quote }}
          {{- end }}
          {{- end }}
          restartPolicy: {{ default "Never" $jobSpec.restartPolicy }}
          {{- with $.Values.priorityClassName }}
          priorityClassName: {{ tpl . $ | quote }}
          {{- end }}
          serviceAccountName: {{ include "polaris.serviceAccountName" $ }}
          automountServiceAccountToken: false
          {{- if $.Values.podSecurityContext }}
          securityContext:
            {{- tpl (toYaml $.Values.podSecurityContext) $ | nindent 12 }}
          {{- end }}
          containers:
            - name: polaris-admin-tool
              {{- if $.Values.containerSecurityContext }}
              securityContext:
                {{- tpl (toYaml $.Values.containerSecurityContext) $ | nindent 16 }}
              {{- end }}
              image: "{{ tpl $.Values.maintenance.image.repository $ }}:{{ tpl $.Values.maintenance.image.tag $ | default $.Chart.Version }}"
              imagePullPolicy: {{ tpl $.Values.maintenance.image.pullPolicy $ }}
              {{- if $jobSpec.args }}
              args:
                {{- range $jobSpec.args }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
              {{- with $jobSpec.resources }}
              resources:
                {{- tpl (toYaml .) $ | nindent 16 }}
              {{- end }}
              {{- $mongoActive := and (eq $.Values.persistence.type "nosql") (eq $.Values.persistence.nosql.backend "MongoDb") -}}
              {{- $persistenceEnv := include "polaris.persistenceEnv" $ -}}
              {{- if or $mongoActive $persistenceEnv $.Values.maintenance.extraEnv }}
              env:
                {{- if $mongoActive }}
                - name: quarkus.mongodb.active
                  value: "true"
                {{- end }}
                {{- with $persistenceEnv }}
                {{- . | nindent 16 }}
                {{- end }}
                {{- with $.Values.maintenance.extraEnv }}
                {{- tpl (toYaml .) $ | nindent 16 }}
                {{- end }}
              {{- end }}
              {{- with $.Values.maintenance.envFrom }}
              envFrom:
                {{- tpl (toYaml .) $ | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: config-volume
                  mountPath: {{ trimSuffix "/" $.Values.image.configDir }}
                  readOnly: true
                - name: temp-dir
                  mountPath: /tmp
                  readOnly: false
                {{- with $.Values.maintenance.extraVolumeMounts }}
                {{- tpl (toYaml .) $ | nindent 16 }}
                {{- end }}
          volumes:
            {{- include "polaris.maintenanceConfigVolume" $ | nindent 12 }}
            - name: temp-dir
              emptyDir: {}
            {{- with $.Values.maintenance.extraVolumes }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- if $.Values.nodeSelector }}
          nodeSelector:
            {{- tpl (toYaml $.Values.nodeSelector) $ | nindent 12 }}
          {{- end }}
          {{- if $.Values.affinity }}
          affinity:
            {{- tpl (toYaml $.Values.affinity) $ | nindent 12 }}
          {{- end }}
          {{- if $.Values.tolerations }}
          tolerations:
            {{- tpl (toYaml $.Values.tolerations) $ | nindent 12 }}
          {{- end }}
{{- end }}
{{- end }}
