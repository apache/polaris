x-aws-client-creds: &aws-client-creds
  AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-polarisadmin}
  AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-polarisadmin}
  AWS_REGION: us-west-2

services:
  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      default:
        aliases:
          - s3.local
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-polarisadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-polarisadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 5
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.2
    profiles: ["rustfs"]
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      default:
        aliases:
          - s3.local
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-polarisadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-polarisadmin}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
  polaris:
    image: apache/polaris:latest
    ports:
      - "8181"
      - "8182"
    environment:
      <<: *aws-client-creds
      GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
      AZURE_TENANT_ID: $AZURE_TENANT_ID
      AZURE_CLIENT_ID: $AZURE_CLIENT_ID
      AZURE_CLIENT_SECRET: $AZURE_CLIENT_SECRET
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      quarkus.log.file.enabled: "false"
      quarkus.otel.sdk.disabled: "true"
      polaris.features."DROP_WITH_PURGE_ENABLED": "true"
      polaris.features."ALLOW_INSECURE_STORAGE_TYPES": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": "[\"FILE\",\"S3\",\"GCS\",\"AZURE\"]"
      polaris.features."ALLOW_OVERLAPPING_CATALOG_URLS": "true"
      polaris.features."ALLOW_NAMESPACE_CUSTOM_LOCATION": "true"
      polaris.features."ENABLE_CATALOG_FEDERATION": "true"
      polaris.readiness.ignore-severe-issues: "true"
    volumes:
      - ./credentials:/tmp/credentials/
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 10s
      retries: 5
  regtest:
    build:
      context: ..
      dockerfile: regtests/Dockerfile
      args:
        POLARIS_HOST: polaris
    depends_on:
      polaris:
        condition: service_healthy
      minio:
        condition: service_healthy
        required: false
      rustfs:
        condition: service_healthy
        required: false
    environment:
      <<: *aws-client-creds
      S3_TEST_BACKEND: ${S3_TEST_BACKEND:-minio}
      AWS_STORAGE_BUCKET: ${AWS_STORAGE_BUCKET:-polaris-test-bucket}
      AWS_ROLE_ARN: $AWS_ROLE_ARN
      AWS_TEST_BASE: $AWS_TEST_BASE
      GCS_TEST_ENABLED: $GCS_TEST_ENABLED
      GCS_TEST_BASE: $GCS_TEST_BASE
      GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
      AZURE_TEST_ENABLED: $AZURE_TEST_ENABLED
      AZURE_TENANT_ID: $AZURE_TENANT_ID
      AZURE_DFS_TEST_BASE: $AZURE_DFS_TEST_BASE
      AZURE_BLOB_TEST_BASE: $AZURE_BLOB_TEST_BASE
      AZURE_CLIENT_ID: $AZURE_CLIENT_ID
      AZURE_CLIENT_SECRET: $AZURE_CLIENT_SECRET
      AWS_CROSS_REGION_TEST_ENABLED: $AWS_CROSS_REGION_TEST_ENABLED
      AWS_CROSS_REGION_BUCKET: $AWS_CROSS_REGION_BUCKET
      AWS_ROLE_FOR_CROSS_REGION_BUCKET: $AWS_ROLE_FOR_CROSS_REGION_BUCKET
      AWS_REGION_FOR_CROSS_REGION_TEST: $AWS_REGION_FOR_CROSS_REGION_TEST
    volumes:
      - ./output:/tmp/polaris-regtests/
      - ./credentials:/tmp/credentials/
