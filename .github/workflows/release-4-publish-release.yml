name: Release - 4 - Publish Release After Vote Success

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (check to enable, uncheck to perform actual operations)'
        required: false
        type: boolean
        default: true
      staging_repository_id:
        description: 'Nexus staging repository ID to release (e.g., orgapachepolaris-1234)'
        required: true
        type: string

jobs:
  publish-release:
    name: Release - 4 - Publish Release After Vote Success
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_without_rc: ${{ steps.release-params.outputs.version_without_rc }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: # zizmor: ignore[artipacked]
          # Fetch full history for proper branch operations
          fetch-depth: 0
          # Use a token with write permissions - persist-credentials is required for git push
          token: ${{ secrets.GITHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up environment variables
        env:
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
          STAGING_REPO_ID_INPUT: ${{ github.event.inputs.staging_repository_id }}
        run: |
          echo "RELEASEY_DIR=$(pwd)/releasey" >> $GITHUB_ENV
          echo "LIBS_DIR=$(pwd)/releasey/libs" >> $GITHUB_ENV

          echo "## Mode" >> $GITHUB_STEP_SUMMARY
          if [[ "${DRY_RUN_INPUT}" == "true" ]]; then
            echo "DRY_RUN=1" >> $GITHUB_ENV
            echo "‼️ DRY_RUN mode enabled - No actual changes will be made" >> $GITHUB_STEP_SUMMARY
          else
            echo "DRY_RUN=0" >> $GITHUB_ENV
            echo "DRY_RUN mode disabled - Performing actual operations" >> $GITHUB_STEP_SUMMARY
          fi

          # Validate staging repository ID parameter
          staging_repo_id="${STAGING_REPO_ID_INPUT}"
          if [[ -z "${staging_repo_id}" ]]; then
            echo "❌ Staging repository ID is required but not provided." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "STAGING_REPOSITORY_ID=${staging_repo_id}" >> $GITHUB_ENV

      - name: Install Subversion
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - name: Auto-determine release parameters from branch and Git state
        id: release-params
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          source "${LIBS_DIR}/_version.sh"

          echo "## Parameters" >> $GITHUB_STEP_SUMMARY

          # Extract the ref name from github.ref
          # github.ref format: refs/heads/branch-name or refs/tags/tag-name
          ref="${GIT_REF}"

          if [[ "${ref}" =~ ^refs/heads/release/(.+)$ ]]; then
            # Running from a release branch
            branch_version="${BASH_REMATCH[1]}"
            current_branch="release/${branch_version}"
          else
            echo "❌ This workflow must be run from a release branch (release/major.minor.x)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Current ref: \`${ref}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please select a release branch (e.g., \`release/1.0.x\`) from the 'Use workflow from' dropdown in the GitHub UI." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Validate branch version format and extract components
          if ! validate_and_extract_branch_version "${branch_version}"; then
            echo "❌ Invalid release branch version format: \`${branch_version}\`. Expected format: major.minor.x." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Find the patch number for this major.minor version by looking at existing tags
          # Note: find_next_patch_number returns the current patch if no final tag exists,
          # which is exactly what we need for publishing (we publish from an RC that has no final tag yet)
          find_next_patch_number "${major}" "${minor}"

          # Build the version string for the patch with RC tags
          version_without_rc="${major}.${minor}.${patch}"

          # Find the latest RC tag for this version
          find_next_rc_number "${version_without_rc}"
          latest_rc=$((rc_number - 1))

          if [[ ${latest_rc} -lt 0 ]]; then
            echo "❌ No RC tags found for version \`${version_without_rc}\`. Expected at least one RC to be created before publishing a release." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          rc_tag="apache-polaris-${version_without_rc}-rc${latest_rc}"

          # Verify the RC tag exists
          if ! git rev-parse "${rc_tag}" >/dev/null 2>&1; then
            echo "❌ RC tag \`${rc_tag}\` does not exist in repository." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Verify that current HEAD is at the RC tag commit
          rc_commit=$(git rev-parse "${rc_tag}")
          current_commit=$(git rev-parse HEAD)

          if [[ "${current_commit}" != "${rc_commit}" ]]; then
            echo "❌ Current HEAD (\`${current_commit}\`) does not match RC tag \`${rc_tag}\` (\`${rc_commit}\`)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This means that some commits have been made on the release branch after the last RC was created." >> $GITHUB_STEP_SUMMARY
            echo "You should not publish a release from a branch that has received additional commits after the last RC was created." >> $GITHUB_STEP_SUMMARY
            echo "Either remove the commits from the release branch so that it points to the last RC that was voted on, or create a new RC from the current state of the branch." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Current HEAD matches RC tag \`${rc_tag}\`" >> $GITHUB_STEP_SUMMARY

          # Create final release tag name
          final_release_tag="apache-polaris-${version_without_rc}"

          # Check if final release tag already exists
          if git rev-parse "${final_release_tag}" >/dev/null 2>&1; then
            echo "❌ Final release tag \`${final_release_tag}\` already exists. This release may have already been published." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Export variables for next steps
          echo "version_without_rc=${version_without_rc}" >> $GITHUB_ENV
          echo "version_without_rc=${version_without_rc}" >> $GITHUB_OUTPUT
          echo "rc_tag=${rc_tag}" >> $GITHUB_ENV
          echo "final_release_tag=${final_release_tag}" >> $GITHUB_ENV
          echo "release_branch=${current_branch}" >> $GITHUB_ENV

          cat <<EOT >> $GITHUB_STEP_SUMMARY
          | Parameter | Value |
          | --- | --- |
          | Version | \`${version_without_rc}\` |
          | RC tag to promote | \`${rc_tag}\` |
          | Final release tag | \`${final_release_tag}\` |
          | Release branch | \`${current_branch}\` |
          | Staging Repository ID | \`${staging_repo_id}\` |
          EOT

      - name: Create final release tag and push to Git repository
        run: |
          source "${LIBS_DIR}/_exec.sh"

          # Get the commit SHA that the RC tag points to
          rc_commit=$(git rev-parse "${rc_tag}")
          echo "rc_commit=${rc_commit}" >> $GITHUB_ENV

          exec_process git tag -a "${final_release_tag}" "${rc_commit}" -m "Apache Polaris ${version_without_rc} Release"
          exec_process git push apache "${final_release_tag}"

          cat <<EOT >> $GITHUB_STEP_SUMMARY
          ## Git Release Tag
          Final release tag \`${final_release_tag}\` created and pushed
          EOT

      - name: Set up Docker Buildx
        run: |
          docker buildx use default
          docker buildx create \
          --platform linux/amd64,linux/arm64 \
          --use \
          --name polarisbuild \
          --driver-opt network=host || docker buildx use polarisbuild
          docker buildx inspect

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Log in to Docker Hub
        if: env.DRY_RUN == '0'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }} # zizmor: ignore[secrets-outside-env]
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login ghcr.io -u "${DOCKERHUB_USER}" --password-stdin

      - name: Publish Polaris Server Docker image to Docker Hub
        run: |
          source "${LIBS_DIR}/_exec.sh"

          exec_process ./gradlew :polaris-server:assemble :polaris-server:quarkusAppPartsBuild --rerun \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.docker.buildx.platform="linux/amd64,linux/arm64" \
            -Dquarkus.container-image.tag="${final_release_tag}"

      - name: Publish Polaris Admin Tool Docker image to Docker Hub
        run: |
          source "${LIBS_DIR}/_exec.sh"

          exec_process ./gradlew :polaris-admin:assemble :polaris-admin:quarkusAppPartsBuild --rerun \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.docker.buildx.platform="linux/amd64,linux/arm64" \
            -Dquarkus.container-image.tag="${final_release_tag}"

          cat <<EOT >> $GITHUB_STEP_SUMMARY
          ## Docker Images
          ✅ Polaris Server and Admin Tool Docker images published to Docker Hub
          EOT

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]
          SVN_USERNAME: ${{ secrets.POLARIS_SVN_DEV_USERNAME }} # zizmor: ignore[secrets-outside-env]
          SVN_PASSWORD: ${{ secrets.POLARIS_SVN_DEV_PASSWORD }} # zizmor: ignore[secrets-outside-env]
        run: |
          echo "::add-mask::$SVN_PASSWORD"

          source "${LIBS_DIR}/_constants.sh"
          source "${LIBS_DIR}/_exec.sh"

          # Create a temporary directory for downloading artifacts
          artifacts_dir="${RELEASEY_DIR}/release-artifacts"
          exec_process mkdir -p "${artifacts_dir}"

          # Download artifacts from the Apache dist dev area.
          # The artifacts remain in dist dev after this workflow completes so that a PMC
          # member can perform the dist dev → dist release `svn mv` manually (the credentials
          # used by this workflow do not have write access to the release area).
          dev_artifacts_url="${APACHE_DIST_URL}/dev/polaris/${version_without_rc}"
          dev_helm_url="${APACHE_DIST_URL}/dev/polaris/helm-chart/${version_without_rc}"

          # Download main artifacts (non-destructive: artifacts stay in dist dev)
          exec_process svn export --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive \
            "${dev_artifacts_url}" "${artifacts_dir}/artifacts"

          # Download Helm chart artifacts (non-destructive: artifacts stay in dist dev)
          exec_process svn export --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive \
            "${dev_helm_url}" "${artifacts_dir}/helm"

          # Prepare the content of the Github Release
          # ********************************************************************************
          release_title="Release ${version_without_rc}"
          release_notes="Apache Polaris ${version_without_rc} Release

          ## Release Artifacts
          This release includes:
          - Source and binary distributions
          - Helm chart package
          - Docker images published to Docker Hub
          - Maven artifacts published to Maven Central

          ## Verification
          All artifacts have been signed with GPG and include SHA-512 checksums for verification.

          ## Docker Images
          - \`apache/polaris:${final_release_tag}\` - Polaris Server
          - \`apache/polaris-admin:${final_release_tag}\` - Polaris Admin Tool"
          # ********************************************************************************

          # Collect all artifacts to attach from the artifacts directory
          readarray -t artifacts_to_attach < <(
            find "${artifacts_dir}" -type f \( \
              -name "*.tar.gz" -o \
              -name "*.tgz" -o \
              -name "*.zip" -o \
              -name "*.asc" -o \
              -name "*.sha512" -o \
              -name "*.prov" \
            \)
          )

          # Create GitHub release and immediately publish it
          exec_process gh release create \
            --title "${release_title}" \
            --notes "${release_notes}" \
            --target "${rc_commit}" \
            "${final_release_tag}" \
            "${artifacts_to_attach[@]}"

          cat <<EOT >> $GITHUB_STEP_SUMMARY
          ## GitHub Release
          GitHub release created: \`${final_release_tag}\`
          EOT

      - name: Release candidate repository on Nexus
        env:
          ORG_GRADLE_PROJECT_apacheUsername: ${{ secrets.NEXUS_STAGE_DEPLOYER_USER }} # zizmor: ignore[secrets-outside-env]
          ORG_GRADLE_PROJECT_apachePassword: ${{ secrets.NEXUS_STAGE_DEPLOYER_PW }} # zizmor: ignore[secrets-outside-env]
        run: |
          source "${LIBS_DIR}/_exec.sh"

          # Use the Gradle task to release the Apache staging repository with the specific staging repository ID
          exec_process ./gradlew releaseApacheStagingRepository --staging-repository-id "${STAGING_REPOSITORY_ID}"

          cat <<EOT >> $GITHUB_STEP_SUMMARY
          ## Nexus
          ✅ Nexus staging repository released
          EOT

      - name: Update previous release binary distribution URLs to archive
        run: |
          source "${LIBS_DIR}/_exec.sh"

          # Use a temporary worktree to operate on the versioned-docs branch without
          # disturbing the current release-branch checkout.
          versioned_docs_dir="${RUNNER_TEMP}/versioned-docs"
          exec_process git fetch origin versioned-docs
          exec_process git worktree add "${versioned_docs_dir}" origin/versioned-docs

          # Find all binary-distribution.md files in version directories,
          # skip the directory for the version being released right now
          # (its docs haven't been added to versioned-docs yet, but we exclude
          # it explicitly for safety).
          changed_files=()
          while IFS= read -r -d '' file; do
            # Derive the version from the first path component inside the worktree
            rel_path="${file#${versioned_docs_dir}/}"
            version_dir="${rel_path%%/*}"
            if [[ "${version_dir}" == "${version_without_rc}" ]]; then
              continue
            fi

            # Replace both incubator and non-incubator downloads URLs with the
            # archive equivalent, so old docs no longer point at the live CDN.
            sed -i \
              -e 's|https://downloads\.apache\.org/incubator/polaris/|https://archive.apache.org/dist/incubator/polaris/|g' \
              -e 's|https://downloads\.apache\.org/polaris/|https://archive.apache.org/dist/polaris/|g' \
              "${file}"

            if ! git -C "${versioned_docs_dir}" diff --quiet -- "${rel_path}"; then
              changed_files+=("${rel_path}")
            fi
          done < <(find "${versioned_docs_dir}" -path "*/getting-started/binary-distribution.md" -print0)

          if [[ ${#changed_files[@]} -gt 0 ]]; then
            exec_process git -C "${versioned_docs_dir}" add "${changed_files[@]}"
            exec_process git -C "${versioned_docs_dir}" commit \
              -m "Update binary distribution URLs to archive for releases superseded by ${version_without_rc}"
            exec_process git -C "${versioned_docs_dir}" push origin HEAD:versioned-docs

            echo "## Binary Distribution URL Updates" >> $GITHUB_STEP_SUMMARY
            echo "Updated to archive URLs in:" >> $GITHUB_STEP_SUMMARY
            for f in "${changed_files[@]}"; do
              echo "- \`${f}\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "## Binary Distribution URL Updates" >> $GITHUB_STEP_SUMMARY
            echo "No binary distribution URLs needed updating" >> $GITHUB_STEP_SUMMARY
          fi

          exec_process git worktree remove "${versioned_docs_dir}" --force

      - name: Release summary
        run: |
          cat <<EOT >> $GITHUB_STEP_SUMMARY
          ## Summary
          🎉 Release published successfully:

          | Component | Status |
          | --- | --- |
          | Git release tag | ✅ Created and pushed |
          | GitHub release | ✅ Created with artifacts attached |
          | Docker images | ✅ Published to Docker Hub |
          | Nexus repository | ✅ Released |
          | Binary dist URL updates | ✅ Previous releases updated to archive URLs |
          | Version | \`${version_without_rc}\` |
          | Final release tag | \`${final_release_tag}\` |

          ⚠️ Manual steps required on \`dist.apache.org\` (the release artifacts remain in dist dev \`dev/polaris\` for these operations):
          - \`svn mv\` distribution artifacts, Helm chart, and Python client from dist dev \`dev/polaris\` to dist release \`release/polaris\`.
          - \`svn mv\` the Helm \`index.yaml\` and \`artifacthub-repo.yml\` from dist dev to \`release/polaris/helm-chart/\`.
          - \`svn rm\` old release versions from \`release/polaris\` that have been superseded by \`${version_without_rc}\`.
          EOT

  publish-python-client:
    name: Publish Python Client to PyPI
    runs-on: ubuntu-latest
    needs: [publish-release]
    permissions:
      contents: read
      # IMPORTANT: this permission is mandatory for Trusted Publishing to PyPI
      id-token: write
    env:
      version_without_rc: ${{ needs.publish-release.outputs.version_without_rc }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up environment variables
        run: |
          echo "RELEASEY_DIR=$(pwd)/releasey" >> $GITHUB_ENV
          echo "LIBS_DIR=$(pwd)/releasey/libs" >> $GITHUB_ENV

      - name: Install Subversion
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - name: Download Python wheel from Apache dist dev repository
        env:
          SVN_USERNAME: ${{ secrets.POLARIS_SVN_DEV_USERNAME }} # zizmor: ignore[secrets-outside-env]
          SVN_PASSWORD: ${{ secrets.POLARIS_SVN_DEV_PASSWORD }} # zizmor: ignore[secrets-outside-env]
        run: |
          echo "::add-mask::$SVN_PASSWORD"

          source "${LIBS_DIR}/_constants.sh"
          source "${LIBS_DIR}/_exec.sh"

          # Download from dist dev. The wheel remains in dist dev so that a PMC member can
          # perform the dist dev → dist release `svn mv` manually after this workflow.
          dev_python_client_url="${APACHE_DIST_URL}/dev/polaris/python-client/${version_without_rc}"

          exec_process svn export --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive \
            "${dev_python_client_url}" dist/

      - name: Publish Python client release to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist/

      - name: Update step summary
        run: |
          cat <<EOT >> $GITHUB_STEP_SUMMARY
          ## Python Client
          ✅ Python client \`${version_without_rc}\` published to PyPI
          EOT
