# Security scans for GitHub Actions workflow files. Container image scanning
# lives in ci.yml (docker-image-scan) because it depends on the built image.

name: Security

on:
  pull_request:
    branches: [ "main", "release/*", "feature/*" ]
  push:
    branches: [ "main", "release/*", "feature/*" ]
  schedule:
    - cron: '16 4 * * 1'

permissions:
  contents: read

jobs:
  zizmor:
    name: Zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Run Zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        if: github.repository_owner == 'apache'
        with:
          # Intentionally leave the defaults, which is to report even informational/low
          # severity/confidence findings.
          #min-severity:
          #min-confidence:
          advanced-security: ${{ github.event_name != 'pull_request' }}
          annotations: ${{ github.event_name == 'pull_request' }}

  codeql:
    name: CodeQL Analyze
    if: github.repository_owner == 'apache'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:actions"
