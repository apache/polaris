name: CI/PR
run-name: PR#${{ github.event.number }} ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches: [ "main", "release/*", "feature/*" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-pr:
    # The 'name' MUST BE CONSTANT, as it becomes a part of the required_checks in .asf.yaml !!
    # Do not rename this job, this is referenced in .asf.yaml!
    name: CI/PR
    # security-events: write is required so that ci.yml's docker-image-scan job
    # can upload Trivy SARIF to Code Scanning. Permissions at this job level
    # become the ceiling for the reusable workflow's jobs.
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/ci.yml
