name: Site Guides

on:
  push:
    branches: [ "main" ]
    paths:
      - 'site/content/guides/**'
      - 'site/it/**'

  pull_request:
    branches: [ "main" ]
    paths:
      - 'site/content/guides/**'
      - 'site/it/**'

  workflow_dispatch:

jobs:
  test-site-guides:
    name: Site Guides Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env

      - name: Test site testing
        working-directory: site/it
        run: |
          echo "::group::Setup"
          python3 -m pip install --upgrade pip
          python3 -m venv .venv
          . .venv/bin/activate
          UV_VERSION="$(cat pyproject.toml | grep -A1 tool.uv | grep -v tool.uv | grep required-version | sed 's/required-version *= *\"\([^\"]*\)\".*/\1/')"
          pip install "uv$UV_VERSION"
          uv sync --all-packages
          echo "::endgroup::"

          echo "::group::pytest"
          pytest
          echo "::endgroup::"

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Prepare Gradle build cache
        uses: ./.github/actions/ci-incr-build-cache-prepare

      - name: Guide testing
        working-directory: site
        run: it/markdown-testing.py

      - name: Archive test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: upload-guides-test-artifacts
          path: |
            site/it/build/tests/**