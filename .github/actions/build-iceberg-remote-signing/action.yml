# TEMPORARY: This action builds the custom Iceberg 1.11.0-remote-signing artifacts
# from adutra/iceberg branch iceberg-1.11-remote-signing and publishes them to
# the local Maven repository. This is needed until the remote signing feature
# is merged into Iceberg and released.
# TODO: Remove this action once Iceberg 1.12 or later is released with remote signing support.

name: 'Build Iceberg Remote Signing'
description: 'Builds custom Iceberg 1.11.0-remote-signing artifacts and publishes to local Maven repository'
runs:
  using: "composite"
  steps:
    - name: Restore Iceberg Maven Local cache
      id: cache-iceberg
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: ~/.m2/repository/org/apache/iceberg
        key: iceberg-remote-signing-maven-local-v2-${{ runner.os }}

    - name: Checkout Iceberg with remote signing
      if: steps.cache-iceberg.outputs.cache-hit != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: adutra/iceberg
        ref: iceberg-1.11-remote-signing
        path: iceberg-remote-signing

    - name: Build Iceberg remote signing artifacts
      if: steps.cache-iceberg.outputs.cache-hit != 'true'
      shell: bash
      working-directory: iceberg-remote-signing
      run: |
        echo "::group::Building Iceberg 1.11.0-remote-signing artifacts..."
        ./gradlew publishToMavenLocal -DsparkVersions=3.5 -DscalaVersion=2.12 -DflinkVersions= -DkafkaVersions=
        ./gradlew publishToMavenLocal -DsparkVersions=3.5 -DscalaVersion=2.13 -DflinkVersions= -DkafkaVersions=
        echo "::endgroup::"

    - name: Cleanup Iceberg checkout
      if: steps.cache-iceberg.outputs.cache-hit != 'true'
      shell: bash
      run: rm -rf iceberg-remote-signing

    - name: Report cache status
      shell: bash
      run: |
        if [[ "${{ steps.cache-iceberg.outputs.cache-hit }}" == "true" ]]; then
          echo "Iceberg 1.11.0-remote-signing artifacts restored from cache"
        else
          echo "Iceberg 1.11.0-remote-signing artifacts built and cached for future runs"
        fi

