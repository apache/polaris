services:

  jobmanager:
    build:
      context: ../flink
    hostname: jobmanager
    depends_on:
      polaris-setup:
        condition: service_healthy
    ports:
      - "8081:8081"
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8081/overview"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2

  taskmanager:
    build:
      context: ../flink
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    deploy:
      replicas: 1
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
